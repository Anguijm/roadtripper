# harness.yml — AI Development Harness Configuration
# Generated by: harness init

# Project identity
name: roadtripper
description: "Road trip planner using Urban Explorer database with persona-based recommendations"

# Stack context (helps council give relevant advice)
stack: node
framework: nextjs  # react, express, fastapi, etc.
language: typescript

# Council configuration
council:
  # Which expert personas to run (add custom ones in .harness/council/)
  angles:
    - security
    - architecture
    - product
  # Minimum consensus score to auto-approve (1-10, 0 = always ask human)
  auto_approve_threshold: 0
  # Default LLM for council calls (used when no per-angle override exists)
  default_model: claude-sonnet-4-6
  # Per-angle model overrides (optional — uncomment to override default_model for specific angles)
  # model_overrides:
  #   security: claude-opus-4-6

# Build commands (harness runs these to verify)
commands:
  install: npm install
  build: npm run build
  test: npm test
  lint: npm run lint
  typecheck: npx tsc --noEmit

# Methodology
cadence: feature-focused  # one feature per session, council review on significant changes
memory: true        # persist decisions across sessions

# Circuit breaker — always pause for human approval
interactive: true
