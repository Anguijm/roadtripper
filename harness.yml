# harness.yml — Roadtripper development harness configuration

# Project identity
name: roadtripper
description: "Road trip planner using Urban Explorer Firestore + persona-driven recommendations + Google Maps routing"

# Stack context
stack: node
framework: nextjs
language: typescript

# Council configuration
#
# As of S8 (2026-04-26), the council is filesystem-driven: every *.md file in
# .harness/council/ (except README.md and lead-architect.md) is a reviewer
# persona, auto-discovered by .harness/scripts/council.py at run time. Adding
# or removing an angle is a file-system operation — no edits needed here.
#
# The runner enforces a hard cap of 15 Gemini calls per run (6 angles + 1
# lead architect = 7 typical, with retry budget). See .harness/README.md.
council:
  # Discovery is filesystem-driven; this list is documentation only.
  active_angles:
    - security
    - architecture
    - product
    - bugs
    - cost
    - accessibility
  resolver: lead-architect
  # The model the council runs on. Override via HARNESS_MODEL env var or
  # --model CLI flag.
  default_model: gemini-2.5-pro
  # Hard cap on Gemini calls per council run (includes retries). Source of
  # truth is `CALL_CAP` in .harness/scripts/council.py; this value is
  # documentation. Worst case = (num_personas + 1) * (MAX_RETRIES + 1).
  # Also declared as a non-negotiable in .harness/council/cost.md.
  call_cap: 15
  # Council never auto-approves; the human reads .harness/last_council.md
  # and decides.
  auto_approve_threshold: 0

# Build commands
commands:
  install: npm install
  build: npm run build
  test: npm test
  lint: npm run lint
  typecheck: npx tsc --noEmit

# Methodology
cadence: feature-focused
memory: true
interactive: true
